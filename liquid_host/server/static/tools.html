<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquid Host — Tool Debugger</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3347;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c8cff;
    --accent-dim: #4a62b3;
    --error: #ff6b6b;
    --success: #51cf66;
    --warning: #ffd43b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ─────────────────────────────── */

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 { font-size: 16px; font-weight: 600; letter-spacing: 0.5px; }
  header h1 a { color: var(--text); text-decoration: none; }
  header h1 a:hover { color: var(--accent); }
  header h1 span { color: var(--text-dim); font-weight: 400; }

  .nav-links { display: flex; gap: 12px; align-items: center; }
  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 13px;
    padding: 4px 10px;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .nav-links a:hover { color: var(--text); background: var(--surface2); }

  /* ── Layout ─────────────────────────────── */

  .container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ────────────────────────────── */

  .sidebar {
    width: 280px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }

  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header input {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .sidebar-header input:focus { border-color: var(--accent-dim); }

  .tool-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .tool-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
    transition: background 0.1s;
  }
  .tool-item:hover { background: var(--surface2); }
  .tool-item.active { background: var(--accent-dim); }

  .tool-item .tool-name {
    font-size: 13px;
    font-weight: 600;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--accent);
  }
  .tool-item.active .tool-name { color: #fff; }

  .tool-item .tool-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tool-item.active .tool-desc { color: rgba(255,255,255,0.7); }

  .tool-item .tool-server {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
    margin-top: 2px;
  }

  .tool-count {
    padding: 8px 16px;
    font-size: 11px;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }

  /* ── Main panel ─────────────────────────── */

  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .tool-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .tool-header h2 {
    font-size: 18px;
    font-weight: 600;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--accent);
  }

  .tool-header p {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
    line-height: 1.5;
  }

  .tool-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* ── Parameters form ────────────────────── */

  .params-section h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .param-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .param-label {
    min-width: 180px;
    flex-shrink: 0;
  }

  .param-label .param-name {
    font-size: 13px;
    font-weight: 600;
    font-family: "SF Mono", "Fira Code", monospace;
    color: var(--text);
  }

  .param-label .param-required {
    font-size: 10px;
    color: var(--error);
    margin-left: 4px;
  }

  .param-label .param-type {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 1px;
  }

  .param-label .param-desc {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
    line-height: 1.4;
  }

  .param-input {
    flex: 1;
  }

  .param-input input, .param-input select, .param-input textarea {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: "SF Mono", "Fira Code", monospace;
    outline: none;
  }
  .param-input input:focus, .param-input textarea:focus { border-color: var(--accent-dim); }
  .param-input textarea { resize: vertical; min-height: 60px; }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text);
    background: var(--surface2);
  }
  .btn:hover { background: var(--border); }
  .btn.primary { background: var(--accent); color: #fff; }
  .btn.primary:hover { background: var(--accent-dim); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .run-status {
    font-size: 12px;
    color: var(--text-dim);
  }

  /* ── Result panel ───────────────────────── */

  .result-section h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .result-meta {
    font-size: 11px;
    font-weight: 400;
    color: var(--text-dim);
    text-transform: none;
    letter-spacing: 0;
  }

  .result-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 12px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 500px;
    overflow-y: auto;
    color: var(--text);
  }

  .result-box.error { border-color: var(--error); color: var(--error); }
  .result-box.empty { color: var(--text-dim); font-style: italic; font-family: inherit; }

  /* ── Empty state ────────────────────────── */

  .empty-state {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* ── Toast ──────────────────────────────── */

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    z-index: 999;
    transition: opacity 0.3s;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .toast.error { border-color: var(--error); color: var(--error); }
  .toast.success { border-color: var(--success); color: var(--success); }
</style>
</head>
<body>

<header>
  <h1><a href="/">Liquid Host</a> <span>/ Tool Debugger</span></h1>
  <div class="nav-links">
    <a href="/">Chat</a>
    <a href="/training">Training Data</a>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <div class="sidebar-header">
      <input type="text" id="search" placeholder="Search tools...">
    </div>
    <div class="tool-list" id="tool-list"></div>
    <div class="tool-count" id="tool-count">Loading...</div>
  </div>

  <div class="main" id="main">
    <div class="empty-state" id="empty-state">
      Select a tool from the sidebar to begin
    </div>
  </div>
</div>

<script>
const API = window.location.origin;
let allTools = [];
let selectedTool = null;
let lastResult = null;

// ── Load tools ───────────────────────────

async function loadTools() {
  try {
    const res = await fetch(`${API}/api/tools`);
    const data = await res.json();
    allTools = data.tools || [];
    renderToolList();
  } catch (e) {
    toast("Failed to load tools: " + e.message, "error");
  }
}

function renderToolList(filter = "") {
  const list = document.getElementById("tool-list");
  const q = filter.toLowerCase();
  const filtered = allTools.filter(t =>
    t.name.toLowerCase().includes(q) ||
    (t.description || "").toLowerCase().includes(q)
  );

  list.innerHTML = filtered.map(t => `
    <div class="tool-item ${selectedTool && selectedTool.name === t.name ? 'active' : ''}"
         data-name="${t.name}">
      <div class="tool-name">${t.name}</div>
      <div class="tool-desc">${t.description ? t.description.slice(0, 80) : 'No description'}</div>
      <div class="tool-server">${t.server}</div>
    </div>
  `).join("");

  document.getElementById("tool-count").textContent = `${filtered.length} / ${allTools.length} tools`;

  list.querySelectorAll(".tool-item").forEach(el => {
    el.addEventListener("click", () => {
      const tool = allTools.find(t => t.name === el.dataset.name);
      if (tool) selectTool(tool);
    });
  });
}

// ── Select tool ──────────────────────────

function selectTool(tool) {
  selectedTool = tool;
  lastResult = null;
  renderToolList(document.getElementById("search").value);
  renderToolPanel(tool);
}

function renderToolPanel(tool) {
  const main = document.getElementById("main");
  const schema = tool.input_schema || {};
  const properties = schema.properties || {};
  const required = schema.required || [];
  const paramNames = Object.keys(properties);

  let paramsHtml = "";
  if (paramNames.length === 0) {
    paramsHtml = '<div style="color: var(--text-dim); font-size: 13px;">This tool takes no parameters.</div>';
  } else {
    paramsHtml = paramNames.map(name => {
      const prop = properties[name];
      const isRequired = required.includes(name);
      const type = prop.type || "string";
      const desc = prop.description || "";
      const enumVals = prop.enum;
      const defaultVal = prop.default !== undefined ? prop.default : "";

      let inputHtml;
      if (enumVals) {
        const opts = enumVals.map(v => `<option value="${v}">${v}</option>`).join("");
        inputHtml = `<select id="param-${name}"><option value="">-- select --</option>${opts}</select>`;
      } else if (type === "boolean") {
        inputHtml = `<select id="param-${name}">
          <option value="">-- default --</option>
          <option value="true">true</option>
          <option value="false">false</option>
        </select>`;
      } else if (type === "object" || type === "array") {
        inputHtml = `<textarea id="param-${name}" placeholder='${type === "array" ? "[]" : "{}"}'>${defaultVal ? JSON.stringify(defaultVal) : ""}</textarea>`;
      } else if (type === "integer" || type === "number") {
        inputHtml = `<input type="number" id="param-${name}" placeholder="${defaultVal}" ${prop.minimum !== undefined ? `min="${prop.minimum}"` : ""} ${prop.maximum !== undefined ? `max="${prop.maximum}"` : ""}>`;
      } else {
        inputHtml = `<input type="text" id="param-${name}" placeholder="${defaultVal}">`;
      }

      return `
        <div class="param-row">
          <div class="param-label">
            <div>
              <span class="param-name">${name}</span>
              ${isRequired ? '<span class="param-required">required</span>' : ''}
            </div>
            <div class="param-type">${type}${enumVals ? ` (enum)` : ''}</div>
            ${desc ? `<div class="param-desc">${desc}</div>` : ''}
          </div>
          <div class="param-input">${inputHtml}</div>
        </div>
      `;
    }).join("");
  }

  main.innerHTML = `
    <div class="tool-header">
      <h2>${tool.name}</h2>
      <p>${tool.description || 'No description available.'}</p>
    </div>
    <div class="tool-body">
      <div class="params-section">
        <h3>Parameters</h3>
        ${paramsHtml}
      </div>
      <div class="actions">
        <button class="btn primary" id="run-btn">Run Tool</button>
        <button class="btn" id="clear-btn">Clear</button>
        <button class="btn" id="copy-curl-btn">Copy cURL</button>
        <span class="run-status" id="run-status"></span>
      </div>
      <div class="result-section" id="result-section" style="display:none;">
        <h3>Result <span class="result-meta" id="result-meta"></span></h3>
        <div class="result-box" id="result-box"></div>
      </div>
    </div>
  `;

  document.getElementById("run-btn").addEventListener("click", runTool);
  document.getElementById("clear-btn").addEventListener("click", () => clearForm(tool));
  document.getElementById("copy-curl-btn").addEventListener("click", copyCurl);
}

// ── Run tool ─────────────────────────────

function gatherArgs() {
  const schema = selectedTool.input_schema || {};
  const properties = schema.properties || {};
  const args = {};

  for (const [name, prop] of Object.entries(properties)) {
    const el = document.getElementById(`param-${name}`);
    if (!el) continue;
    const val = el.value.trim();
    if (!val) continue;

    const type = prop.type || "string";
    if (type === "integer") {
      args[name] = parseInt(val, 10);
    } else if (type === "number") {
      args[name] = parseFloat(val);
    } else if (type === "boolean") {
      args[name] = val === "true";
    } else if (type === "object" || type === "array") {
      try { args[name] = JSON.parse(val); }
      catch { args[name] = val; }
    } else {
      args[name] = val;
    }
  }
  return args;
}

async function runTool() {
  const btn = document.getElementById("run-btn");
  const status = document.getElementById("run-status");
  const resultSection = document.getElementById("result-section");
  const resultBox = document.getElementById("result-box");
  const resultMeta = document.getElementById("result-meta");

  const args = gatherArgs();

  btn.disabled = true;
  status.textContent = "Running...";
  resultSection.style.display = "block";
  resultBox.className = "result-box empty";
  resultBox.textContent = "Waiting for response...";

  const startTime = performance.now();

  try {
    const res = await fetch(`${API}/api/tools/call`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name: selectedTool.name, arguments: args }),
    });

    const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);

    if (!res.ok) {
      const errText = await res.text();
      resultBox.className = "result-box error";
      resultBox.textContent = `HTTP ${res.status}: ${errText}`;
      resultMeta.textContent = `${elapsed}s`;
      status.textContent = "Error";
      return;
    }

    const data = await res.json();
    lastResult = data;

    // Try to pretty-print the result
    let display;
    try {
      const parsed = JSON.parse(data.result);
      display = JSON.stringify(parsed, null, 2);
    } catch {
      display = data.result;
    }

    resultBox.className = "result-box";
    resultBox.textContent = display;
    const chars = data.result ? data.result.length : 0;
    resultMeta.textContent = `${elapsed}s | ${chars.toLocaleString()} chars`;
    status.textContent = `Done in ${elapsed}s`;
  } catch (e) {
    resultBox.className = "result-box error";
    resultBox.textContent = e.message;
    status.textContent = "Failed";
  } finally {
    btn.disabled = false;
  }
}

function clearForm(tool) {
  const schema = tool.input_schema || {};
  const properties = schema.properties || {};
  for (const name of Object.keys(properties)) {
    const el = document.getElementById(`param-${name}`);
    if (el) el.value = "";
  }
  document.getElementById("result-section").style.display = "none";
  document.getElementById("run-status").textContent = "";
  lastResult = null;
}

function copyCurl() {
  const args = gatherArgs();
  const payload = JSON.stringify({ name: selectedTool.name, arguments: args });
  const curl = `curl -X POST ${API}/api/tools/call \\\n  -H "Content-Type: application/json" \\\n  -d '${payload}'`;
  navigator.clipboard.writeText(curl).then(() => toast("cURL copied!", "success"));
}

// ── Toast ────────────────────────────────

function toast(msg, type = "") {
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => { el.style.opacity = "0"; setTimeout(() => el.remove(), 300); }, 3000);
}

// ── Search ───────────────────────────────

document.getElementById("search").addEventListener("input", (e) => {
  renderToolList(e.target.value);
});

// ── Keyboard shortcut ────────────────────

document.addEventListener("keydown", (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter" && selectedTool) {
    e.preventDefault();
    runTool();
  }
});

// ── Init ─────────────────────────────────

loadTools();
</script>
</body>
</html>
